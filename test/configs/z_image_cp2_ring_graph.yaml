launch:
  tag: zimage-cp2-ring-graph
  backend: torchrun
  num_nodes: 1
  gpus_per_node: 2
  python_script: test/test_z_image.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-zimage-cp2-ring-graph

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Z-Image
  ckpt_dir: /dockerdata/Z-Image

parallel:
  # cfp=1 -> pure context parallel; cp_size = total_gpus / cfp = 2.
  cfp: 1
  up: 1

infer:
  attn_type: flash_attn
  low_mem_level: 0

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs/test-ring-graph
  run_log: true
  memory: true
  timer: true
  log_ranks: [0]

overrides:
  # Wall-clock benchmark (NOT profile-serialized): the CUDA-Graph win of
  # ring_graph -- comm/compute overlap + eliminated cross-rank launch jitter --
  # only shows up when the ring loop is allowed to overlap, which the synchronized
  # CP profiler deliberately defeats. So run this WITHOUT CHITU_Z_IMAGE_CP_PROFILE
  # and read the steady-state dit_forward from the timer (the first step pays the
  # one-time graph capture; later steps are pure replay).
  - models.sampler.sample_steps=10
  # Pure context-parallel benchmark: disable CFG so each forward is a single
  # sample (batch=1), which is the path the CP wrapper parallelizes.
  - models.sampler.guidance_scale=[1.0]
