launch:
  tag: zimage-cp4-unified
  backend: torchrun
  num_nodes: 1
  gpus_per_node: 4
  python_script: test/test_z_image.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-zimage-cp4-unified

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Z-Image
  ckpt_dir: /dockerdata/Z-Image

parallel:
  # cfp=1 -> pure context parallel; cp_size = total_gpus / cfp = 4.
  cfp: 1
  # up=2 -> initialize the size-2 UP (Ulysses) sub-groups {0,1},{2,3} so the
  # unified mode (CHITU_Z_IMAGE_CP_MODE=unified CHITU_Z_IMAGE_CP_UP=2) can do
  # Ulysses within the fast intra-NUMA pair + Ring (2 steps) across NUMA.
  up: 2

infer:
  attn_type: flash_attn
  low_mem_level: 0

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs/test-cp4-unified
  run_log: true
  memory: true
  timer: true
  log_ranks: [0]

overrides:
  - models.sampler.sample_steps=10
  - models.sampler.guidance_scale=[1.0]
