launch:
  tag: zimage-cp4-unified-g4
  backend: torchrun
  num_nodes: 1
  gpus_per_node: 4
  python_script: test/test_z_image.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-zimage-cp4-unified-g4

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Z-Image
  ckpt_dir: /dockerdata/Z-Image

parallel:
  cfp: 1
  up: 2

infer:
  attn_type: flash_attn
  low_mem_level: 0

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs/test-cp4-unified-g4
  run_log: true
  memory: true
  timer: true
  log_ranks: [0]

overrides:
  - float_16bit_variant=bfloat16
  - models.sampler.sample_steps=50
  - models.sampler.guidance_scale=[4.0]
