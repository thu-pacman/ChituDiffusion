launch:
  tag: zimage-cp2-profile
  backend: torchrun
  num_nodes: 1
  gpus_per_node: 2
  python_script: test/test_z_image.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-zimage-cp2-profile

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Z-Image
  ckpt_dir: /dockerdata/Z-Image

parallel:
  # cfp=1 -> pure context parallel; cp_size = total_gpus / cfp = 2.
  cfp: 1
  up: 1

infer:
  attn_type: flash_attn
  low_mem_level: 0

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs/test-50step
  run_log: true
  memory: true
  timer: true
  log_ranks: [0]

overrides:
  - models.sampler.sample_steps=5
  # Pure context-parallel benchmark: disable CFG so each forward is a single
  # sample (batch=1). With cfg_size=1 and guidance>1 the runtime batches pos+neg
  # into one batch=2 forward, which the CP wrapper deliberately skips.
  - models.sampler.guidance_scale=[1.0]
