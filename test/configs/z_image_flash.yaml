launch:
  tag: zimage-attn-flash
  num_nodes: 1
  gpus_per_node: 1
  python_script: test/test_z_image.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-zimage-attn-flash

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Z-Image
  ckpt_dir: /home/chenyy/WORK/models/Z-Image

parallel:
  cfp: 1
  up: 1

infer:
  attn_type: flash_attn
  low_mem_level: 0

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs/test-smoke
  run_log: true
  memory: true
  timer: true
  log_ranks: [0]

overrides:
  - models.sampler.sample_steps=3
