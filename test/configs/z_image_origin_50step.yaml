launch:
  tag: zimage-origin
  backend: torchrun
  num_nodes: 1
  gpus_per_node: 1
  python_script: test/test_z_image.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-zimage-origin

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Z-Image
  ckpt_dir: /dockerdata/Z-Image

parallel:
  cfp: 1
  up: 1

infer:
  attn_type: flash_attn
  low_mem_level: 0

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs/test-origin
  run_log: true
  memory: true
  timer: true
  log_ranks: [0]

overrides:
  # Z-Image is bf16-native; full-pipeline fp16 overflows to NaN, so the 16-bit
  # origin reference uses bfloat16 (single GPU, no CP, no fp8).
  - float_16bit_variant=bfloat16
  - models.sampler.sample_steps=50
  - models.sampler.guidance_scale=[1.0]
