name: FLUX.1-dev
type: flux1-dev
source: "https://huggingface.co/black-forest-labs/FLUX.1-dev"
ckpt_dir: null
tokenizer_path: null
tokenizer_type: "hf"

task: t2i

encoder:
  name: "clip_t5"
  max_sequence_length: 512

vae:
  type: "autoencoder_kl"
  checkpoint: "vae"
  scale_factor: 16

sampler:
  sample_steps: 50
  guidance_scale: [3.5]
  boundary: []
  num_train_timesteps: 1000

transformer:
  patch_size: 1
  in_channels: 64
  out_channels: null
  num_layers: 19
  num_single_layers: 38
  attention_head_dim: 128
  num_attention_heads: 24
  joint_attention_dim: 4096
  pooled_projection_dim: 768
  guidance_embeds: true
  axes_dims_rope: [16, 56, 56]
