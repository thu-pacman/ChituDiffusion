site_name: Smart-Diffusion Documentation
site_description: High-Performance Diffusion Model Inference Framework
site_author: PACMAN Team, Tsinghua University & QingCheng.ai
site_url: https://chen-yy20.github.io/SmartDiffusion/

repo_name: chen-yy20/SmartDiffusion
repo_url: https://github.com/chen-yy20/SmartDiffusion
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 入门指南
            Installation: 安装
            Quick Start: 快速开始
            Configuration: 配置
            User Guide: 用户指南
            Basic Usage: 基本用法
            Advanced Features: 高级功能
            Performance Tuning: 性能调优
            Multi-GPU Setup: 多GPU设置
            Architecture: 架构
            Overview: 概览
            Design Philosophy: 设计理念
            Parallelism: 并行化
            Attention Backends: 注意力后端
            API Reference: API参考
            Core API: 核心API
            Backend: 后端
            Generator: 生成器
            Task Management: 任务管理
            Scheduler: 调度器
            Advanced Topics: 高级主题
            Low Memory Mode: 低内存模式
            FlexCache: 灵活缓存
            Custom Models: 自定义模型
            Evaluation: 评估
            Contributing: 贡献
            Developer Guide: 开发者指南
            Code Style: 代码风格
            Testing: 测试
            Why Smart-Diffusion: 为什么选择Smart-Diffusion
            FAQ: 常见问题
            Changelog: 更新日志
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Basic Usage: user-guide/basic-usage.md
    - Advanced Features: user-guide/advanced-features.md
    - Performance Tuning: user-guide/performance-tuning.md
    - Multi-GPU Setup: user-guide/multi-gpu.md
  - Architecture:
    - Overview: architecture/overview.md
    - Design Philosophy: architecture/design-philosophy.md
    - Parallelism: architecture/parallelism.md
    - Attention Backends: architecture/attention-backends.md
  - API Reference:
    - Core API: api/core.md
    - Backend: api/backend.md
    - Generator: api/generator.md
    - Task Management: api/task.md
    - Scheduler: api/scheduler.md
  - Advanced Topics:
    - Low Memory Mode: advanced/low-memory.md
    - FlexCache: advanced/flexcache.md
    - Custom Models: advanced/custom-models.md
    - Evaluation: advanced/evaluation.md
  - Contributing:
    - Developer Guide: contributing/developer-guide.md
    - Code Style: contributing/code-style.md
    - Testing: contributing/testing.md
  - Why Smart-Diffusion: whySmart.md
  - FAQ: faq.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chen-yy20/SmartDiffusion
  version:
    provider: mike

copyright: Copyright &copy; 2025 PACMAN Team, Tsinghua University & QingCheng.ai
