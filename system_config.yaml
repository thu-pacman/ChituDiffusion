launch:
  tag: wan-flexcache
  backend: torchrun
  num_nodes: 1
  gpus_per_node: 4
  python_script: test/test_flexcache.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-diffusion

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

# Wan2.1-T2V-1.3B, FLUX.1-dev
model:
  name: Wan2.1-T2V-1.3B
  # Flux-1  flux2-klein  Wan2.1-T2V-1.3B  Wan2.1-T2V-14B
  ckpt_dir: /home/chenyy/WORK/models/Wan2.1-T2V-1.3B

parallel:
  # cfg-parallel factor: only 1 or 2.
  cfp: 2

infer:
  attn_type: torch_sdpa
  low_mem_level: 0
  enable_flexcache: true
  up_limit: 1

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs
  run_log: false
  memory: false
  timer: true
  log_ranks: [0]
  
# Extra dotlist overrides appended to the launch command.
# Example:
# overrides:
#   - infer.max_reqs=4
#   - infer.memory_utilization=0.95
overrides: []
