launch:
  tag: perf
  num_nodes: 1
  gpus_per_node: 3
  python_script: test/test_flexcache.py
  srun:
    partition: a100
    mem_per_gpu: 60536 
    cpus_per_gpu: 16
    job_name: chitu-diffusion

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Wan2.1-T2V-1.3B
  ckpt_dir: /home/dataset/Wan2.1-T2V-1.3B

parallel:
  # cfg-parallel factor: only 1 or 2.
  cfp: 1  
  cp_size : 1
  fpp_size: 3

infer:
  attn_type: flash_attn
  low_mem_level: 0
  enable_flexcache: true
  up_limit: 8 

eval:
  eval_type: [psnr,lpips]
  reference_path: /home/chenyy/WORK/cyy/SmartDiffusion/outputs/origin/origin_a_cat_walking_on_grass_20260401_174307_wan2_1_t2v_1_3b

output:
  root_dir: outputs
  enable_run_log: true
  enable_timer_dump: true
  enable_kv_capture: true
  hydra_dump_mode: off

  
# Extra hydra overrides appended to the launch command.
# Example:
# overrides:
#   - infer.max_reqs=4
#   - infer.memory_utilization=0.95
overrides: []
