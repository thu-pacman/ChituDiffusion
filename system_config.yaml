launch:
  tag: taylor
  num_nodes: 1
  gpus_per_node: 2
  python_script: test/test_flexcache.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-diffusion

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: Wan2.1-T2V-1.3B
  ckpt_dir: /home/chenyy/WORK/models/Wan2.1-T2V-1.3B

parallel:
  # cfg-parallel factor: only 1 or 2.
  cfp: 2

infer:
  attn_type: flash_attn
  low_mem_level: 0
  enable_flexcache: true
  up_limit: 1

eval:
  eval_type: [psnr,lpips]
  reference_path: /home/chenyy/WORK/cyy/ChituDiffusion/outputs/origin/origin-20260602_105824-0db83df4

output:
  root_dir: outputs
  run_log: false
  memory: false
  timer: true
  log_ranks: [0]
  
# Extra dotlist overrides appended to the launch command.
# Example:
# overrides:
#   - infer.max_reqs=4
#   - infer.memory_utilization=0.95
overrides: []
