launch:
  tag: flux1-flexcache
  num_nodes: 1
  gpus_per_node: 1
  python_script: test/test_flux1_flexcache.py
  srun:
    partition: debug
    cpus_per_gpu: 24
    job_name: chitu-diffusion

runtime:
  chitu_debug: true
  cuda_launch_blocking: false

model:
  name: FLUX.1-dev
  ckpt_dir: /home/chenyy/WORK/models/Flux-1

parallel:
  # cfg-parallel factor: only 1 or 2.
  cfp: 1

infer:
  attn_type: flash_attn
  low_mem_level: 0
  enable_flexcache: true
  up_limit: 1

eval:
  eval_type: []
  reference_path: null

output:
  root_dir: outputs
  run_log: false
  memory: false
  timer: true
  log_ranks: [0]
  
# Extra dotlist overrides appended to the launch command.
# Example:
# overrides:
#   - infer.max_reqs=4
#   - infer.memory_utilization=0.95
overrides: []
